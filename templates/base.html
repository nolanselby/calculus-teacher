<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calc Tutor{% block title %}{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <script>
    MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)'], ['$', '$']],
        displayMath: [['\\[', '\\]'], ['$$', '$$']]
      },
      options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre'] }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>

<body>

  <!-- ── Navbar ──────────────────────────────────────────────────────────────── -->
  <nav class="navbar navbar-expand-lg navbar-dark px-4">
    <a class="navbar-brand fw-bold fs-5" href="/">
      ∫ Calc Tutor
    </a>
    <div class="navbar-nav ms-auto d-flex flex-row align-items-center gap-1">
      <a class="nav-link nav-pill {% if request.path == '/' %}active{% endif %}" href="/">
        <i class="bi bi-camera-fill me-1"></i>Solve
      </a>
      <a class="nav-link nav-pill {% if request.path == '/quiz' %}active{% endif %}" href="/quiz">
        <i class="bi bi-patch-question-fill me-1"></i>Quiz
      </a>
      <a class="nav-link nav-pill {% if request.path == '/teach' %}active{% endif %}" href="/teach">
        <i class="bi bi-book-fill me-1"></i>Formulas
      </a>
    </div>
  </nav>

  <!-- ── Main Content ─────────────────────────────────────────────────────────── -->
  <main class="container py-4">
    {% block content %}{% endblock %}
  </main>

  <!-- ── Toast Notifications ──────────────────────────────────────────────────── -->
  <div id="toast-container" class="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>

</html>
